<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS System</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <!-- Sidebar -->
    <nav class="sidebar">
        <h2>POS System</h2>
        <div class="nav-item active" data-target="dashboard">Dashboard</div>
        <div class="nav-item" data-target="billing">Billing</div>
        <div class="nav-item" data-target="products">Products</div>
        <div class="nav-item logout" id="logout-btn">Logout</div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Dashboard Section -->
        <section id="dashboard" class="section active">
            <div class="header">
                <h1>Dashboard</h1>
            </div>
            <div class="dashboard-cards">
                <div class="card">
                    <h3>Total Sales (₹)</h3>
                    <p id="dash-total-sales">0</p>
                </div>
                <div class="card">
                    <h3>Total Orders</h3>
                    <p id="dash-total-orders">0</p>
                </div>
            </div>
        </section>

        <!-- Billing Section -->
        <section id="billing" class="section">
            <div class="header">
                <h1>Billing</h1>
            </div>
            <div class="billing-container">
                <div class="cart-items" id="cart-items-container">
                    <p style="text-align: center; color: #7a7a7a;">Cart is empty</p>
                </div>
                <div class="cart-summary">
                    <div class="summary-header">Order Summary</div>
                    <div class="summary-row">
                        <span>Items:</span>
                        <span id="cart-item-count">0</span>
                    </div>
                    <div class="summary-total">
                        <span>Total:</span>
                        <span>₹<span id="cart-total-price">0</span></span>
                    </div>
                    <button class="btn-primary btn-checkout" id="checkout-btn" disabled>Checkout</button>
                </div>
            </div>
        </section>

        <!-- Products Section -->
        <section id="products" class="section">
            <div class="header">
                <h1>Products</h1>
            </div>

            <div class="card" style="margin-bottom: 2rem; text-align: left;">
                <h3 style="margin-bottom: 1rem;">Add New Product</h3>
                <form id="add-product-form" style="display: flex; gap: 1rem; align-items: flex-end; flex-wrap: wrap;">
                    <div class="input-group" style="margin-bottom: 0; flex: 1; min-width: 200px;">
                        <label for="prod-name">Product Name</label>
                        <input type="text" id="prod-name" required placeholder="e.g. Apple">
                    </div>
                    <div class="input-group" style="margin-bottom: 0; flex: 1; min-width: 100px;">
                        <label for="prod-price">Price (₹)</label>
                        <input type="number" id="prod-price" required min="1" placeholder="0">
                    </div>
                    <div class="input-group" style="margin-bottom: 0; flex: 1; min-width: 100px;">
                        <label for="prod-stock">Stock</label>
                        <input type="number" id="prod-stock" required min="1" placeholder="0">
                    </div>
                    <button type="submit" class="btn-primary" style="width: auto; padding: 0.75rem 1.5rem;">Add
                        Product</button>
                </form>
            </div>

            <div class="products-grid" id="products-grid-container">
            </div>
        </section>
    </main>

    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/pos.js"></script>
</body>

</html>
